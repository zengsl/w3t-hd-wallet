<!-- src/main/resources/templates/eth-transfer.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>以太坊转账</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 600px; margin: 0 auto; }
        input, select, button { padding: 10px; margin: 5px 0; width: 100%; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; cursor: pointer; }
        button:hover { background: #0056b3; }
        .form-group { margin-bottom: 15px; }
        .hidden { display: none; }
        .error { color: red; margin: 10px 0; }
        .info { font-size: 12px; color: #666; background: #f8f9fa; padding: 10px; border-radius: 4px; margin-bottom: 15px; }
    </style>
</head>
<body>
<h2>以太坊转账</h2>

<div class="info">
    <strong>说明：</strong><br>
    • <b>本地签名</b>：需要输入私钥，交易在本地完成签名。<br>
    • <b>MPC 签名</b>：无需私钥，交易由后端 MPC 节点签名。
</div>

<!-- 模式选择 -->
<div class="form-group">
    <label for="signMode">签名方式：</label>
    <select id="signMode" name="signMode" onchange="toggleForm()">
        <option value="local">本地签名 (Local)</option>
        <option value="mpc">MPC 签名 (Server)</option>
    </select>
</div>

<!-- 本地签名表单 -->
<form id="localForm" action="/eth/transfer/local" method="post">
    <div class="form-group">
        <label>私钥 (Private Key):</label>
        <input type="password" name="privateKey" placeholder="请输入私钥">
    </div>
    <div class="form-group">
        <label>发送方地址 (From):</label>
        <input type="text" name="from" placeholder="0x...">
    </div>
    <div class="form-group">
        <label>接收方地址 (To):</label>
        <input type="text" name="to" placeholder="0x...">
    </div>
    <div class="form-group">
        <label>金额 (Amount):</label>
        <input type="number" step="0.0001" name="amount" placeholder="ETH">
    </div>
    <button type="submit">发送 (本地签名)</button>
</form>

<!-- MPC 签名表单 -->
<form id="mpcForm" action="/eth/transfer/mpc" method="post" class="hidden">
    <div class="form-group">
        <label>发送方地址 (From):</label>
        <input type="text" name="from" placeholder="0x... (MPC托管地址)">
    </div>
    <div class="form-group">
        <label>接收方地址 (To):</label>
        <input type="text" name="to" placeholder="0x...">
    </div>
    <div class="form-group">
        <label>金额 (Amount):</label>
        <input type="number" step="0.0001" name="amount" placeholder="ETH">
    </div>
    <button type="submit">发送 (MPC签名)</button>
</form>

<div th:if="${error}" class="error">
    <p th:text="${error}"></p>
</div>

<script>
    function toggleForm() {
        var mode = document.getElementById('signMode').value;
        var localForm = document.getElementById('localForm');
        var mpcForm = document.getElementById('mpcForm');

        if (mode === 'local') {
            localForm.classList.remove('hidden');
            mpcForm.classList.add('hidden');
        } else {
            mpcForm.classList.remove('hidden');
            localForm.classList.add('hidden');
        }
    }
</script>
</body>
</html>
